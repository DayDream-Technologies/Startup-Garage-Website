<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Startup Garage</title>
    <script>
      // GitHub Pages SPA redirect.
      // Rewrites the path to the SPA index so React Router can handle the route.
      // Adapted from https://github.com/rafgraph/spa-github-pages (MIT licensed).
      (function () {
        var pathSegmentsToKeep = 1; // For project pages (e.g. /Startup-Garage-Website/...).
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
